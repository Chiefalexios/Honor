name: Build HonorGuard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

     - name: Fix styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.HonorGuard" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/transparent</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
              <style name="Theme.HonorGuard.InCall" parent="Theme.HonorGuard" />
          </resources>
          EOF

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HonorGuard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
